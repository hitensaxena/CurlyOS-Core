name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      # Tests mock their DB pools (AsyncMock) — no service containers needed.
      # Heavy extras (embeddings/torch, neo4j, nats) deliberately excluded.
      - run: uv sync --extra dev --extra postgres --extra redis
      - run: uv run ruff check api_server.py
      - run: uv run pytest -q
