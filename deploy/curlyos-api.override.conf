# systemd drop-in for curlyos-api — install with:
#   sudo mkdir -p /etc/systemd/system/curlyos-api.service.d
#   sudo cp deploy/curlyos-api.override.conf /etc/systemd/system/curlyos-api.service.d/override.conf
#   sudo systemctl daemon-reload && sudo systemctl restart curlyos-api
#
# MemoryHigh/Max: if the API's memory ever runs away, the kernel throttles at
# 2.2G and kills (just) the API at 2.8G — which Restart=on-failure then brings
# back — instead of the OOM killer picking postgres or redis. Normal RSS with
# the bge-m3 model loaded is ~1.0-1.1G, so this is generous headroom.
[Service]
Restart=on-failure
RestartSec=5
MemoryHigh=2200M
MemoryMax=2800M
